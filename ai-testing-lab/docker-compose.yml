services:
  # -------------------------------------------------------------------------
  # Model serving local, interfaz compatible con OpenAI (/v1/chat/completions)
  # Inspirado en: ollama/ollama (MIT). Alternativas documentadas en
  # docs/architecture.md: mudler/LocalAI, vllm-project/vllm.
  # -------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ailab-ollama
    ports:
      # Bind explícito a loopback: la Fase 1 es para uso local únicamente
      # (ver docs/security-notes.md). Sin el prefijo "127.0.0.1:", Docker
      # publica el puerto en 0.0.0.0 (todas las interfaces), alcanzable
      # desde cualquier otra máquina de la misma red.
      - "127.0.0.1:${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - ailab-net

  # -------------------------------------------------------------------------
  # API gateway propia (FastAPI). Expone endpoints propios para agentes,
  # RAG, chat, evals y reportes. Implementación original.
  # -------------------------------------------------------------------------
  api:
    build:
      # Raíz del lab: hornea venvs DeepEval/Ragas desde evals/*/requirements.txt
      context: .
      dockerfile: app/Dockerfile
    container_name: ailab-api
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - PHOENIX_COLLECTOR_ENDPOINT=http://phoenix:4317
      - PHOENIX_UI_URL=http://127.0.0.1:6006
      - PHOENIX_PROBE_URL=http://phoenix:6006
      - LAB_ROOT=/lab
    ports:
      - "127.0.0.1:${API_PORT:-8080}:8080"
    volumes:
      - ./app:/app
      - rag_index:/app/rag/.index
      # Raíz del laboratorio: scripts/, evals/, reports/ (evals UI-0B).
      - ./:/lab
    depends_on:
      ollama:
        condition: service_healthy
      phoenix:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 25s
    restart: unless-stopped
    networks:
      - ailab-net

  # -------------------------------------------------------------------------
  # Observabilidad local: Arize Phoenix (OTel-native, un solo contenedor,
  # sin dependencias externas de DB). Elegido en vez de Langfuse para la
  # Fase 1 por simplicidad de despliegue (ver docs/architecture.md).
  # Licencia: Elastic License 2.0 (ELv2) - ver docs/security-notes.md.
  # -------------------------------------------------------------------------
  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: ailab-phoenix
    ports:
      - "127.0.0.1:${PHOENIX_UI_PORT:-6006}:6006"
      - "127.0.0.1:${PHOENIX_OTLP_PORT:-4317}:4317"
    volumes:
      - phoenix_data:/mnt/data
    environment:
      - PHOENIX_WORKING_DIR=/mnt/data
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:6006', timeout=3)",
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    restart: unless-stopped
    networks:
      - ailab-net

  # -------------------------------------------------------------------------
  # UI Streamlit (UI-1A): cliente HTTP del Gateway. No habla con Ollama,
  # Phoenix, scripts ni filesystem directamente.
  # -------------------------------------------------------------------------
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: ailab-ui
    environment:
      - AILAB_API_BASE_URL=http://api:8080
      - AILAB_API_PUBLIC_URL=http://127.0.0.1:${API_PORT:-8080}
      - AILAB_OPENAPI_DOCS_URL=http://127.0.0.1:${API_PORT:-8080}/docs
      - AILAB_PHOENIX_PUBLIC_URL=http://127.0.0.1:${PHOENIX_UI_PORT:-6006}
      - AILAB_HTTP_CONNECT_TIMEOUT=3
      - AILAB_HTTP_READ_TIMEOUT=15
      - AILAB_CHAT_READ_TIMEOUT=120
      - AILAB_SKILL_READ_TIMEOUT=120
      - AILAB_RAG_READ_TIMEOUT=180
      - AILAB_EVAL_CREATE_TIMEOUT=30
      - AILAB_EVAL_READ_TIMEOUT=15
      - AILAB_UI_TIMEZONE=UTC
      - AILAB_STATUS_CACHE_TTL=30
    ports:
      - "127.0.0.1:${UI_PORT:-8501}:8501"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ailab-net

networks:
  ailab-net:
    name: ailab-net

volumes:
  ollama_data:
    name: ailab-ollama-data
  phoenix_data:
    name: ailab-phoenix-data
  rag_index:
    name: ailab-rag-index
