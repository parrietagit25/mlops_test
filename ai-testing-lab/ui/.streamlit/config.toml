# Configuración Streamlit (UI-1A.1)
# Oculta la navegación multipágina automática y reduce la barra de desarrollo
# sin bloquear rerun ni mensajes de error.

[client]
# Desactiva el listado automático de páginas (por si quedara una carpeta pages/).
showSidebarNavigation = false
# Oculta "Deploy"; mantiene menú mínimo usable en local.
toolbarMode = "minimal"

[browser]
gatherUsageStats = false

[theme]
base = "dark"
primaryColor = "#3d8bfd"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#161b22"
textColor = "#e6edf3"
font = "sans serif"
